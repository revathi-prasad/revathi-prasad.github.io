<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AI Podcast Pipeline — Portfolio Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:transparent;font-family:Inter,sans-serif}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;box-sizing:border-box;background:#ffffff}
  .card-wrap{width:100%;max-width:560px;aspect-ratio:560/440}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root" class="card-wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const REPO_URL = "https://github.com/revathi-prasad/ai-builders-podcast";

// ─── Wordmark ─────────────────────────────────────────────
const Wordmark = ({ size = 16, color = '#f4ecdc' }) => (
  <span style={{display:'inline-flex',alignItems:'center',gap:6,fontFamily:'Inter',fontWeight:700,fontSize:size,color,letterSpacing:'-0.02em',lineHeight:1}}>
    <svg width={size*0.95} height={size*0.95} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="9" y="2" width="6" height="12" rx="3"/>
      <path d="M5 10v2a7 7 0 0 0 14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
    </svg>
    <span>podcast<span style={{opacity:.55,fontWeight:500}}>.pipe</span></span>
  </span>
);

// ─── Browser window frame ─────────────────────────────────
const BrowserWindow = ({ width, height, children }) => (
  <div style={{
    width, height,
    borderRadius: 10,
    background: '#fff',
    boxShadow: '0 18px 40px -12px rgba(0,0,0,.22), 0 2px 6px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.04)',
    overflow: 'hidden',
    display: 'flex',
    flexDirection: 'column'
  }}>
    <div style={{
      height: 24,
      background: 'linear-gradient(to bottom, #ececec, #dedede)',
      borderBottom: '1px solid #c4c4c4',
      display: 'flex',
      alignItems: 'center',
      padding: '0 9px',
      gap: 5,
      flexShrink: 0
    }}>
      <span style={{width:8,height:8,borderRadius:'50%',background:'#ff5f57'}}></span>
      <span style={{width:8,height:8,borderRadius:'50%',background:'#febc2e'}}></span>
      <span style={{width:8,height:8,borderRadius:'50%',background:'#28c840'}}></span>
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#f9fafb'}}>{children}</div>
  </div>
);

// ─── Generate page mid-pipeline ──────────────────────────
const GenerateScreen = () => {
  const Stage = ({ state, label, meta, icon }) => {
    const colors = {
      done:   { bg: 'transparent', fg: '#16a34a', meta: '#9ca3af' },
      active: { bg: '#eff6ff',     fg: '#2563eb', meta: '#2563eb' },
      todo:   { bg: 'transparent', fg: '#9ca3af', meta: '#9ca3af' }
    }[state];
    return (
      <div style={{
        display:'flex',alignItems:'center',gap:6,
        padding:'4px 6px',borderRadius:4,
        background:colors.bg,
        fontSize:9,color:colors.fg,
        fontWeight: state==='active' ? 500 : 400,
      }}>
        <span style={{
          width:10,height:10,display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0,
          animation: state==='active' ? 'spin 1.4s linear infinite' : 'none'
        }}>{icon}</span>
        <span style={{flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{label}</span>
        <span style={{fontFamily:'JetBrains Mono',fontSize:7.5,color:colors.meta,fontVariantNumeric:'tabular-nums'}}>{meta}</span>
      </div>
    );
  };
  const checkIcon = <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
  const spinIcon  = <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>;
  const dotIcon   = <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="9"/></svg>;

  return (
    <>
      {/* mini app header */}
      <div style={{
        height:28,background:'#fff',borderBottom:'1px solid #e5e7eb',
        padding:'0 9px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0
      }}>
        <Wordmark size={9.5} color="#111" />
        <div style={{display:'flex',gap:1}}>
          <span style={{fontSize:8,color:'#9ca3af',padding:'2px 5px'}}>Home</span>
          <span style={{fontSize:8,color:'#0369a1',padding:'2px 5px',background:'#f0f9ff',borderRadius:3,fontWeight:500}}>Generate</span>
          <span style={{fontSize:8,color:'#9ca3af',padding:'2px 5px'}}>History</span>
        </div>
      </div>

      <div style={{padding:'9px 9px 8px',display:'flex',flexDirection:'column',gap:7,overflow:'hidden',flex:1}}>
        <div>
          <div style={{fontSize:11.5,fontWeight:700,color:'#111',letterSpacing:'-.01em',lineHeight:1.15}}>Generating…</div>
          <div style={{fontSize:8,color:'#6b7280',marginTop:1.5}}>"AI in healthcare" · Hindi · 10 min</div>
        </div>

        {/* pipeline card */}
        <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:5,padding:'7px 6px'}}>
          <div style={{fontSize:7.5,fontWeight:600,color:'#374151',marginBottom:3,letterSpacing:'.04em',textTransform:'uppercase'}}>Agent pipeline</div>
          <div style={{display:'flex',flexDirection:'column',gap:0}}>
            <Stage state="done"   label="Router · classified topic"   meta="0.4s"     icon={checkIcon}/>
            <Stage state="done"   label="Gatherer · 12 facts"          meta="8.2s"    icon={checkIcon}/>
            <Stage state="active" label="Generator · writing script"   meta="running" icon={spinIcon}/>
            <Stage state="todo"   label="Verifier · 2-layer check"     meta="queued"  icon={dotIcon}/>
            <Stage state="todo"   label="Synthesizer · VibeVoice"      meta="queued"  icon={dotIcon}/>
          </div>
          {/* progress bar */}
          <div style={{marginTop:5,height:3,background:'#e5e7eb',borderRadius:99,overflow:'hidden'}}>
            <div style={{height:'100%',width:'62%',background:'#0284c7',borderRadius:99}}></div>
          </div>
        </div>

        {/* KG strip — single row */}
        <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:5,padding:'6px'}}>
          <div style={{fontSize:7.5,fontWeight:600,color:'#374151',marginBottom:4,letterSpacing:'.04em',textTransform:'uppercase'}}>Knowledge graph · 12 facts</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
            {[
              ['FDA: 692 AI devices','who'],
              ['Acc. +14%','nature'],
              ['Adoption 78%','acr'],
            ].map(([f,s],i)=>(
              <span key={i} style={{
                fontSize:7,
                background:'#f9fafb',border:'1px solid #e5e7eb',
                padding:'2px 5px',borderRadius:99,
                fontFamily:'JetBrains Mono',color:'#4b5563',
                whiteSpace:'nowrap'
              }}>{f}<span style={{color:'#0284c7',marginLeft:3}}>·{s}</span></span>
            ))}
          </div>
        </div>
      </div>
    </>
  );
};

// ─── The Card ─────────────────────────────────────────────
const Card = () => (
  <a href={REPO_URL} target="_blank" rel="noopener" style={{
    textDecoration:'none',display:'block',position:'relative',
    width:'100%',height:'100%',
    background:'#fff',border:'1px solid #e5e5e5',borderRadius:18,
    boxSizing:'border-box',color:'#111',
    boxShadow:'0 8px 24px rgba(0,0,0,.05)',
    overflow:'hidden'
  }}>
    {/* warm cream gradient — match PUPL */}
    <div style={{
      position:'absolute',inset:0,
      background:'linear-gradient(135deg, #faf6ec 0%, #fff 70%)',
      pointerEvents:'none'
    }}></div>

    {/* LEFT: text column — vertically centered */}
    <div style={{position:'absolute',top:'50%',left:30,width:240,zIndex:2,transform:'translateY(-50%)'}}>
      <div style={{background:'#000',padding:'7px 11px',borderRadius:9,display:'inline-flex'}}>
        <Wordmark size={15} />
      </div>
      <h2 style={{
        margin:'18px 0 9px',
        fontSize:19,fontWeight:600,
        letterSpacing:'-.012em',lineHeight:1.2
      }}>An open, observable<br/>podcast pipeline</h2>
      <p style={{margin:0,fontSize:12,color:'#555',lineHeight:1.5}}>
        Multi-agent system producing culturally-adapted audio in English, Hindi, and Tamil — every fact, source, and stage observable end to end.
      </p>
      <div style={{display:'flex',gap:4,marginTop:14,flexWrap:'wrap'}}>
        {['LangGraph','Kuzu','FastAPI','React','RL'].map(t => (
          <span key={t} style={{fontSize:9,padding:'2px 6px',borderRadius:4,background:'#f4f4f4',color:'#444',fontFamily:'JetBrains Mono'}}>{t}</span>
        ))}
      </div>
      <div style={{marginTop:16,fontFamily:'JetBrains Mono',fontSize:9,color:'#888',letterSpacing:'.08em'}}>2025 — RESEARCH</div>
    </div>

    {/* RIGHT: browser — 248px × 360px, vertically centered */}
    <div style={{position:'absolute',right:24,top:'50%',transform:'translateY(-50%)',zIndex:1}}>
      <BrowserWindow width={248} height={360}>
        <GenerateScreen />
      </BrowserWindow>
    </div>
  </a>
);

const mount = () => ReactDOM.createRoot(document.getElementById('root')).render(<Card />);
if (document.fonts && document.fonts.ready) document.fonts.ready.then(mount); else mount();
</script>
</body>
</html>
