<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pupl — Portfolio Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#ffffff;font-family:Inter,sans-serif}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;box-sizing:border-box}
  /* Card responsively shrinks on small screens via CSS scale */
  .card-wrap{width:100%;max-width:560px;aspect-ratio:560/440}
</style>
</head>
<body>
<div id="root" class="card-wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const REPO_URL = "https://github.com/revathi-prasad/Pupl"; // ← edit if your repo is elsewhere

// ─── Wordmark ─────────────────────────────────────────────
const Wordmark = ({ size = 20, color = '#f4ecdc' }) => {
  const dot = size * 0.16;
  const Pchar = () => (
    <span style={{position:'relative',display:'inline-block'}}>
      p<span style={{position:'absolute',left:'50%',top:'58%',transform:'translate(-50%,-50%)',width:dot,height:dot,background:'#000',borderRadius:'50%'}}></span>
    </span>
  );
  return (
    <span style={{display:'inline-flex',alignItems:'center',fontFamily:'Inter',fontWeight:900,fontSize:size,color,letterSpacing:'-0.04em',lineHeight:1}}>
      <Pchar />u<Pchar />l
    </span>
  );
};

// ─── iPhone frame ──────────
const IPhone = ({ width = 195, height = 400, children }) => {
  const radius = width * 0.16;
  return (
    <div style={{width,height,borderRadius:radius,background:'#000',padding:6,boxSizing:'border-box',boxShadow:'0 20px 50px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.05) inset',position:'relative'}}>
      <div style={{width:'100%',height:'100%',background:'#000',borderRadius:radius-6,overflow:'hidden',position:'relative',display:'flex',flexDirection:'column'}}>
        <div style={{height:32,display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 18px 0',color:'#fff',fontFamily:'-apple-system, Inter',fontSize:11,fontWeight:600,position:'relative',zIndex:2}}>
          <span>9:41</span>
          <span style={{display:'flex',gap:4,alignItems:'center'}}>
            <svg width="14" height="9" viewBox="0 0 14 9"><rect x="0" y="6" width="2" height="3" rx="0.5" fill="#fff"/><rect x="3.5" y="4" width="2" height="5" rx="0.5" fill="#fff"/><rect x="7" y="2" width="2" height="7" rx="0.5" fill="#fff"/><rect x="10.5" y="0" width="2" height="9" rx="0.5" fill="#fff"/></svg>
            <svg width="20" height="9" viewBox="0 0 20 9"><rect x="0.5" y="0.5" width="16" height="8" rx="2" stroke="#fff" strokeOpacity="0.5" fill="none"/><rect x="2" y="2" width="13" height="5" rx="1" fill="#fff"/><rect x="17" y="3" width="1.5" height="3" rx="0.5" fill="#fff" fillOpacity="0.5"/></svg>
          </span>
        </div>
        <div style={{position:'absolute',top:8,left:'50%',transform:'translateX(-50%)',width:width*0.32,height:18,borderRadius:12,background:'#000',zIndex:3}}></div>
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>{children}</div>
        <div style={{height:18,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{width:width*0.32,height:3,borderRadius:2,background:'rgba(255,255,255,.6)'}}></div>
        </div>
      </div>
    </div>
  );
};

// ─── Pupl Results screen ─────────────────────────
const ResultsInPhone = () => {
  const Metric = ({ label, value, unit, status, statusColor }) => (
    <div style={{background:'#1c1c1e',border:'1px solid #3a3a3c',borderRadius:8,padding:'8px 10px'}}>
      <div style={{fontSize:8,fontWeight:600,color:'#aeaeb2',letterSpacing:'.06em',textTransform:'uppercase',fontFamily:'Inter'}}>{label}</div>
      <div style={{fontSize:18,fontWeight:500,fontFamily:'JetBrains Mono, monospace',color:'#fff',marginTop:2,fontVariantNumeric:'tabular-nums',lineHeight:1.1}}>{value}{unit && <span style={{fontSize:9,color:'#aeaeb2',marginLeft:2}}>{unit}</span>}</div>
      <div style={{display:'flex',alignItems:'center',gap:4,marginTop:3,fontSize:8,color:'#aeaeb2',fontFamily:'Inter'}}>
        <span style={{width:4,height:4,borderRadius:'50%',background:statusColor}}></span>{status}
      </div>
    </div>
  );
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',padding:'4px 14px 8px',gap:9,overflow:'hidden'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'2px 0'}}>
        <span style={{color:'#0a84ff',fontSize:11,fontFamily:'Inter'}}>‹ Back</span>
        <span style={{color:'#fff',fontSize:11,fontWeight:600,fontFamily:'Inter'}}>Results</span>
        <span style={{width:30}}></span>
      </div>
      <div style={{display:'inline-flex',alignSelf:'flex-start',alignItems:'center',gap:4,padding:'2px 7px',borderRadius:9999,background:'rgba(10,132,255,.15)',border:'1px solid rgba(10,132,255,.4)',fontSize:8,color:'#0a84ff',fontWeight:600}}>
        <span style={{width:4,height:4,borderRadius:'50%',background:'#0a84ff'}}></span>Clinical Assessment
      </div>
      <div>
        <div style={{fontSize:8,color:'#aeaeb2',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:1,fontFamily:'Inter'}}>Session complete</div>
        <div style={{fontSize:14,fontWeight:600,color:'#fff',fontFamily:'Inter',letterSpacing:'-.01em',lineHeight:1.2}}>Performance Summary</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
        <Metric label="Sust. Attention" value="82" status="Typical" statusColor="#30d158" />
        <Metric label="Working Mem." value="76" status="Slightly elev." statusColor="#ff9f0a" />
        <Metric label="Resp. Var." value="0.34" unit="ms" status="Typical" statusColor="#30d158" />
        <Metric label="Comm. Errors" value="3" unit="/40" status="Typical" statusColor="#30d158" />
      </div>
      <div style={{background:'rgba(10,132,255,.06)',border:'1px solid rgba(10,132,255,.25)',borderRadius:8,padding:'6px 8px'}}>
        <div style={{fontSize:9,fontWeight:600,color:'#fff',marginBottom:2,fontFamily:'Inter'}}>Clinical Disclaimer</div>
        <div style={{fontSize:7.5,color:'#8e8e93',lineHeight:1.4,fontFamily:'Inter'}}>For informational purposes only. Not a clinical diagnosis. Consult a qualified healthcare professional.</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:'auto'}}>
        <div style={{height:30,borderRadius:8,background:'#0a84ff',color:'#fff',fontFamily:'Inter',fontSize:11,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 4px rgba(0,0,0,.3)'}}>Save to Cloud</div>
        <div style={{height:28,borderRadius:8,border:'1px solid #3a3a3c',color:'#fff',fontFamily:'Inter',fontSize:11,fontWeight:500,display:'flex',alignItems:'center',justifyContent:'center'}}>New Assessment</div>
      </div>
    </div>
  );
};

// ─── The Card ─────────────────────────────────────
const PuplCard = () => (
  <a href={REPO_URL} target="_blank" rel="noopener" style={{textDecoration:'none',display:'block',position:'relative',width:'100%',height:'100%',background:'#fff',border:'1px solid #e5e5e5',borderRadius:18,boxSizing:'border-box',color:'#111',boxShadow:'0 8px 24px rgba(0,0,0,.05)',overflow:'hidden'}}>
    <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg, #faf6ec 0%, #fff 70%)',pointerEvents:'none'}}></div>

    <div style={{position:'absolute',top:32,left:32,width:260,zIndex:2}}>
      <div style={{background:'#000',padding:'7px 12px',borderRadius:10,display:'inline-flex'}}>
        <Wordmark size={20} />
      </div>
      <h2 style={{margin:'20px 0 10px',fontSize:20,fontWeight:600,letterSpacing:'-.01em',lineHeight:1.2}}>Smart pupillometry for ADHD diagnosis</h2>
      <p style={{margin:0,fontSize:13,color:'#555',lineHeight:1.55}}>iOS app using on-device ML to flag ADHD markers from front-camera pupil response.</p>
      <div style={{display:'flex',gap:6,marginTop:16,flexWrap:'wrap'}}>
        {['Swift','CoreML','XGBoost','Firebase'].map(t => (
          <span key={t} style={{fontSize:10,padding:'2px 8px',borderRadius:6,background:'#f4f4f4',color:'#444',fontFamily:'JetBrains Mono'}}>{t}</span>
        ))}
      </div>
      <div style={{marginTop:18,fontFamily:'JetBrains Mono',fontSize:10,color:'#888',letterSpacing:'.08em'}}>2024 — IOS</div>
    </div>

    <div style={{position:'absolute',right:24,top:'50%',transform:'translateY(-50%)',zIndex:1}}>
      <IPhone width={195} height={400}>
        <ResultsInPhone />
      </IPhone>
    </div>
  </a>
);

const mount = () => ReactDOM.createRoot(document.getElementById('root')).render(<PuplCard />);
if (document.fonts && document.fonts.ready) document.fonts.ready.then(mount); else mount();
</script>
</body>
</html>
